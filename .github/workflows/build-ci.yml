name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  GO_VERSION: '1.26.2'

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-linux-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-linux-

      - name: Build Desktop (Linux x64)
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --no-daemon -Pcompose.desktop.buildTypes=debug

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytoolboxgui-linux-x64
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: warn

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-windows-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-windows-

      - name: Build Desktop (Windows x64)
        shell: cmd
        run: gradlew.bat :composeApp:packageDistributionForCurrentOS --no-daemon -Pcompose.desktop.buildTypes=debug

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytoolboxgui-windows-x64
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Build Android APK (Debug)
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxytoolboxgui-android
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
